services:
  openclaw:
    image: coollabsio/openclaw:latest
    restart: unless-stopped
    ports:
      - "8080:8080"
    # nginx in the image references a "browser" upstream (kasmweb sidecar).
    # We don't want the sidecar for the workshop, so point "browser" at
    # localhost so nginx starts without resolving errors.
    extra_hosts:
      - "browser:127.0.0.1"
    environment:
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      OPENCLAW_GATEWAY_TOKEN: workshop
      # Let the gateway accept WebSocket origins that match the Host header.
      # Codespaces forwards from a URL we don't know at container boot, so
      # explicit allowedOrigins can't be set. Host-header fallback is the
      # documented workaround for this exact case.
      OPENCLAW_CONFIG_JSON: '{"gateway":{"controlUi":{"dangerouslyAllowHostHeaderOriginFallback":true}}}'
    volumes:
      - openclaw-data:/data

volumes:
  openclaw-data:
